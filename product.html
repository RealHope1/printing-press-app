<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product - INKWATT</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/glass-ui.css">
</head>
<body>
    <header>
        <nav class="glass-nav">
            <div class="logo">INKWATT</div>
            <div class="hamburger" onclick="toggleMenu()">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <ul id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="product" class="product-section">
        <div class="product-gallery">
            <div class="gallery-item flip-3d">
                <img src="images/t-sert.jpg" alt="Product Image" loading="lazy">
            </div>
            <div class="gallery-item flip-3d">
                <img src="images/photo_17_2026-03-07_18-17-47.jpg" alt="Product Image" loading="lazy">
            </div>
            <div class="gallery-item flip-3d">
                <img src="images/photo_18_2026-03-07_18-17-48.jpg" alt="Product Image" loading="lazy">
            </div>
        </div>
        <div class="product-details">
            <h1>Product Name</h1>
            <p>Description</p>
            <form id="orderForm">
                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" min="1" value="1">
                <label for="paperSize">Paper Size:</label>
                <select id="paperSize">
                    <option value="A4">A4</option>
                    <option value="A3">A3</option>
                    <!-- More sizes -->
                </select>
                <label for="artwork">Artwork:</label>
                <input type="file" id="artwork">
                <button type="button" onclick="sendOrder()" class="btn-glow">Send Order to WhatsApp</button>
            </form>
        </div>
    </section>

    <a href="#" class="whatsapp-float" onclick="openChatbot(); return false;">
        <img src="images/logo.png" alt="WhatsApp">
        Chat With Us
    </a>

    <script src="js/app.js"></script>
    <script src="js/whatsappBot.js"></script>
</body>
</html>
